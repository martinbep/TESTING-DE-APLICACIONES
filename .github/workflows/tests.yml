name: CI - Tests Calculadora

# Se dispara en push y en pull request a la rama main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Ejecutar pruebas con pytest
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar el repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Ejecutar tests con pytest y generar reporte HTML
        run: |
          pytest --html=report.html --self-contained-html

      - name: 5. Subir el reporte HTML como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pytest
          path: report.html
